name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    
    steps:
    - name: Checkout site
      uses: actions/checkout@v4

    - name: Deploy site files
      run: |
        set -euo pipefail
        sudo mkdir -p /var/www/shelva-site
        sudo cp -r ./*.html /var/www/shelva-site/
        sudo cp -r ./images /var/www/shelva-site/
        sudo cp -f favicon.ico favicon.png icon.png /var/www/shelva-site/
        sudo systemctl reload nginx
