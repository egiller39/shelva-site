name: Legacy Deploy to DigitalOcean

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    
    steps:
    - name: Checkout site
      uses: actions/checkout@v4

    - name: Deploy site files
      run: |
        set -euo pipefail
        mkdir -p /var/www/shelva-site
        cp -r ./*.html /var/www/shelva-site/
        cp -r ./images /var/www/shelva-site/
        cp -f favicon.ico favicon.png icon.png /var/www/shelva-site/
        sudo systemctl reload nginx
